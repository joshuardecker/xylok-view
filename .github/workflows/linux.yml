name: Linux

on:
  workflow_dispatch:

jobs:
  build-linux-flatpak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08
      - name: Build
        run: bash scripts/linux.sh

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xylok-view-flatpak
          path: xylok-view.flatpak

  build-linux-appimage:
    runs-on: ubuntu-latest
    # AlmaLinux 8 provides glibc 2.28, giving compatibility with RHEL 8+
    # and Ubuntu 18.04+. The binary links against this older glibc at build
    # time, so the AppImage runs on any distro with glibc >= 2.28.
    container:
      image: almalinux:8

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y dnf-plugins-core epel-release
          dnf config-manager --set-enabled powertools
          dnf install -y \
            gcc curl pkg-config file \
            wayland-devel libxkbcommon-devel fontconfig-devel \
            libX11-devel libXcursor-devel libXrandr-devel libXi-devel \
            mesa-libGL-devel mesa-libEGL-devel

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install appimagetool
        run: |
          curl -fsSL -o /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage
          cd /tmp && APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool.AppImage --appimage-extract
          mv /tmp/squashfs-root /opt/appimagetool
          ln -sf /opt/appimagetool/AppRun /usr/local/bin/appimagetool

      - name: Build
        run: bash scripts/linux.sh

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xylok-view-appimage
          path: xylok-view.AppImage
